<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bills History Daily — Admin</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family: Georgia, serif; background: #f9fafb; color: #1f2937; min-height:100vh; }
    .header { background: #00338D; color: white; padding: 16px 32px; display:flex; align-items:center; justify-content:space-between; }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header span { font-size: 12px; opacity: 0.75; letter-spacing: 1px; text-transform: uppercase; }
    .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
    .config-section { background: white; border: 1px solid #e5e7eb; border-radius: 6px; padding: 20px; margin-bottom: 28px; }
    .section-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #C60C30; font-weight: 600; margin-bottom: 12px; }
    .token-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #6b7280; margin-bottom: 4px; margin-top: 10px; }
    .token-input { width: 100%; padding: 9px 12px; font-size: 13px; border: 1px solid #d1d5db; border-radius: 4px; font-family: monospace; }
    .save-btn { margin-top: 10px; padding: 8px 18px; background: #00338D; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
    .save-btn:hover { background: #001f5c; }
    .date-bar { display:flex; gap:12px; align-items:center; margin-bottom:24px; }
    .date-bar input[type=date] { padding: 10px 14px; font-size: 14px; border: 1px solid #d1d5db; border-radius: 4px; font-family: Georgia, serif; }
    .load-btn { padding: 10px 24px; background: #00338D; color: white; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; }
    .load-btn:hover { background: #001f5c; }
    .status { padding: 12px 16px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; }
    .status.info    { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
    .status.error   { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    .status.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .instructions { font-size: 13px; color: #6b7280; margin-bottom: 20px; line-height: 1.7; background: white; padding: 16px; border-radius: 6px; border: 1px solid #e5e7eb; }
    .legend { display:flex; gap:20px; margin-bottom:8px; flex-wrap:wrap; }
    .legend-item { display:flex; align-items:center; gap:8px; font-size:12px; color: #4b5563; }
    .legend-dot { width:14px; height:14px; border-radius:3px; flex-shrink:0; }
    .dot-headline { background: #C60C30; }
    .dot-writeup  { background: #7c3aed; }
    .dot-list     { background: #00338D; }

    /* Article table */
    .articles-table-wrap { background: white; border: 1px solid #e5e7eb; border-radius: 6px; overflow: hidden; margin-bottom: 32px; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #f3f4f6; }
    th { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #6b7280; font-weight: 600; padding: 10px 14px; text-align: left; border-bottom: 2px solid #00338D; }
    th.check-col { width: 40px; text-align: center; }
    tbody tr { border-bottom: 1px solid #f3f4f6; transition: background 0.12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8faff; }
    td { padding: 12px 14px; font-size: 13px; vertical-align: top; }
    td.check-col { text-align: center; padding: 14px 8px; }
    .article-title-cell { font-weight: 600; color: #1f2937; line-height: 1.4; }
    .article-title-cell a { color: #00338D; text-decoration: none; font-size: 11px; font-weight: 400; margin-left: 8px; opacity: 0.7; }
    .article-title-cell a:hover { opacity: 1; text-decoration: underline; }
    .source-badge { display:inline-block; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:#00338D; border:1px solid #e5e7eb; padding:2px 7px; border-radius:2px; margin-top:4px; }

    /* Checkbox styles */
    .cb-wrap { display:flex; align-items:center; justify-content:center; }
    .cb { width: 20px; height: 20px; border: 2px solid #d1d5db; border-radius: 4px; cursor: pointer; display:flex; align-items:center; justify-content:center; transition: all 0.15s; flex-shrink:0; }
    .cb:hover { border-color: #6b7280; }
    .cb.headline { border-color: #C60C30; }
    .cb.headline.checked { background: #C60C30; border-color: #C60C30; }
    .cb.writeup { border-color: #7c3aed; }
    .cb.writeup.checked { background: #7c3aed; border-color: #7c3aed; }
    .cb.list { border-color: #00338D; }
    .cb.list.checked { background: #00338D; border-color: #00338D; }
    .check-icon { display:none; }
    .cb.checked .check-icon { display:block; }

    /* Row highlight when any checkbox is checked */
    tbody tr.row-selected { background: #f8faff; }
    tbody tr.row-headline { background: #fff5f5; }

    /* Selection summary */
    .summary-bar { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:24px; }
    .summary-card { background: white; border: 1px solid #e5e7eb; border-radius: 6px; padding: 14px 16px; }
    .summary-count { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .summary-count.c-headline { color: #C60C30; }
    .summary-count.c-writeup  { color: #7c3aed; }
    .summary-count.c-list     { color: #00338D; }
    .summary-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #6b7280; }

    /* Select all row */
    .select-all-row td { background: #f9fafb; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #6b7280; padding: 8px 14px; }
    .select-all-row .cb-wrap { cursor: pointer; }

    /* Preview */
    .preview-box { background: white; border: 1px solid #e5e7eb; border-radius: 6px; padding: 20px; margin-bottom: 20px; }
    .preview-headline { font-size: 22px; font-weight: 700; color: #00338D; margin-bottom: 10px; line-height: 1.3; }
    .preview-writeup { font-size: 14px; line-height: 1.7; color: #4b5563; font-style: italic; }
    .preview-placeholder { font-size: 13px; color: #9ca3af; font-style: italic; }
    .spinner { display:inline-block; width:13px; height:13px; border:2px solid #bfdbfe; border-top-color:#00338D; border-radius:50%; animation:spin 0.8s linear infinite; margin-right:6px; vertical-align:middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Publish */
    .publish-section { border-top: 2px solid #e5e7eb; padding-top: 28px; }
    .publish-btn { width:100%; padding:16px; background:#C60C30; color:white; border:none; border-radius:6px; font-size:15px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; font-family:Georgia,serif; transition:background 0.15s; }
    .publish-btn:hover:not(:disabled) { background: #991b1b; }
    .publish-btn:disabled { background: #9ca3af; cursor: not-allowed; }
    .empty { text-align:center; padding:48px; color:#9ca3af; font-style:italic; font-size:14px; }

    /* Photo picker */
    .photo-section { margin-bottom:32px; }
    .photo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; margin-top:12px; }
    .photo-item { position:relative; border:3px solid transparent; border-radius:6px; overflow:hidden; cursor:pointer; transition:border-color 0.15s; aspect-ratio:16/9; background:#f3f4f6; }
    .photo-item:hover { border-color:#9ca3af; }
    .photo-item.selected { border-color:#C60C30; }
    .photo-item img { width:100%; height:100%; object-fit:cover; display:block; }
    .photo-item.selected::after { content:'✓'; position:absolute; top:6px; right:6px; background:#C60C30; color:white; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; }
    .photo-none { border:2px dashed #d1d5db; border-radius:6px; padding:20px; text-align:center; font-size:13px; color:#9ca3af; font-style:italic; }
    .photo-default { border:2px dashed #d1d5db; border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:12px; color:#6b7280; transition:border-color 0.15s; aspect-ratio:16/9; }
    .photo-default:hover { border-color:#00338D; color:#00338D; }
    .photo-default.selected { border-color:#C60C30; border-style:solid; color:#C60C30; }
  </style>
</head>
<body>
<div class="header">
  <h1>🦬 Bills History Daily — Admin</h1>
  <span>Editorial Review</span>
</div>
<div class="container">
  <div id="app"></div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  date: new Date(Date.now() - 86400000).toISOString().split('T')[0],
  articles: [],
  images: [],
  selectedImage: null,   // URL of selected photo, or 'default' for defaultimage.jpeg
  headline: new Set(),   // indices of articles used for headline/themes
  writeup:  new Set(),   // indices of articles used in writeup
  list:     new Set(),   // indices of articles shown in coverage list
  loading: false,
  publishing: false,
  generating: false,
  status: null,
  preview: null,
  apiKey:      localStorage.getItem('bhd_api_key') || '',
  githubToken: localStorage.getItem('bhd_github_token') || '',
};
const GITHUB_REPO = 'Trevor-Davis/billshistorydaily';

function setState(u) { Object.assign(state, u); render(); }

// ── Data loading ──────────────────────────────────────────────────────────────
async function loadArticles() {
  setState({ loading:true, status:null, articles:[], images:[], selectedImage:null, headline:new Set(), writeup:new Set(), list:new Set(), preview:null });
  try {
    const res = await fetch(`/pending/${state.date}.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`No pending articles for ${state.date}. Run the fetch workflow first.`);
    const data = await res.json();
    setState({ loading:false, articles: data.articles||[], images: data.images||[], selectedImage:null, status:{ type:'info', msg:`${data.articles.length} articles found for ${data.date}. Select which to include.` }});
  } catch(e) {
    setState({ loading:false, status:{ type:'error', msg:e.message }});
  }
}

// ── Toggle helpers ────────────────────────────────────────────────────────────
function toggle(set, idx) {
  const s = new Set(set);
  s.has(idx) ? s.delete(idx) : s.add(idx);
  return s;
}

function toggleHeadline(idx) {
  const headline = toggle(state.headline, idx);
  // Headline articles are always included in writeup and list too
  const writeup = new Set(state.writeup);
  const list    = new Set(state.list);
  if (headline.has(idx)) { writeup.add(idx); list.add(idx); }
  setState({ headline, writeup, list, preview:null });
  if (headline.size > 0) generatePreview(headline);
}

function toggleWriteup(idx) {
  const writeup = toggle(state.writeup, idx);
  // If removing from writeup, also remove from headline
  const headline = new Set(state.headline);
  if (!writeup.has(idx)) headline.delete(idx);
  setState({ writeup, headline, preview: headline.size > 0 ? state.preview : null });
}

function toggleList(idx) {
  setState({ list: toggle(state.list, idx) });
}

function selectAll(type) {
  const all = new Set(state.articles.map((_,i)=>i));
  if (type === 'list') setState({ list: all });
  if (type === 'writeup') setState({ writeup: all });
}

function clearAll() {
  setState({ headline: new Set(), writeup: new Set(), list: new Set(), preview: null });
}

// ── Preview generation ────────────────────────────────────────────────────────
async function generatePreview(selected) {
  if (!state.apiKey || selected.size === 0) return;
  setState({ generating: true });
  const titles = [...selected].map(i => `- ${state.articles[i].title} (${state.articles[i].source})`).join('\n');
  try {
    const res = await fetch('https://billshistorydaily-apiproxy.vercel.app/api/claude', {
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:200,
        messages:[{role:'user',content:`Based on these Buffalo Bills articles:\n${titles}\n\nWrite a punchy 6-10 word newspaper headline. Respond with ONLY the headline, nothing else.`}]
      })
    });
    const data = await res.json();
    const headline = data.content?.[0]?.text?.trim() || '';
    setState({ generating:false, preview:{ headline }});
  } catch(e) { setState({ generating:false }); }
}

// ── Publish ───────────────────────────────────────────────────────────────────
async function publish() {
  const { apiKey, githubToken, headline, writeup, list, articles, images, selectedImage, date } = state;
  if (!apiKey)       return setState({ status:{ type:'error', msg:'Enter your Anthropic API key.' }});
  if (!githubToken)  return setState({ status:{ type:'error', msg:'Enter your GitHub Personal Access Token.' }});
  if (headline.size === 0) return setState({ status:{ type:'error', msg:'Select at least one article for the headline.' }});
  if (list.size === 0)     return setState({ status:{ type:'error', msg:'Select at least one article to include in the coverage list.' }});

  setState({ publishing:true, status:{ type:'info', msg:'Generating headline, themes, and writeup...' }});

  try {
    const headlineArticles = [...headline].map(i => articles[i]);
    const writeupArticles  = [...writeup].map(i => articles[i]);
    const listArticles     = [...list].map(i => articles[i]);

    const headlineTitles = headlineArticles.map(a => `- ${a.title} (${a.source})`).join('\n');
    const writeupTitles  = writeupArticles.map(a => `- ${a.title} (${a.source})`).join('\n');

    const genRes = await fetch('https://billshistorydaily-apiproxy.vercel.app/api/claude', {
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:1000,
        messages:[{role:'user',content:`You are writing content for Bills History Daily, a Buffalo Bills news archive.

FEATURED articles (use ONLY these for the headline and themes):
${headlineTitles}

WRITEUP articles (use ALL of these for the narrative summary):
${writeupTitles}

Generate this JSON:
{
  "headline": "punchy 6-10 word newspaper-style headline based on the FEATURED articles only",
  "themes": ["theme 1", "theme 2", "theme 3"],
  "writeup": "3-5 sentence engaging sports journalism narrative covering ALL the writeup articles"
}

Rules:
- headline: 6-10 words max, no period, based only on featured articles
- themes: exactly 3 short noun phrases (3-5 words each) from the featured articles
- writeup: flowing narrative covering the full scope of the writeup articles
- Respond ONLY with the JSON object.`}]
      })
    });

    const genData = await genRes.json();
    const genText = genData.content?.[0]?.text || '';
    const match = genText.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Could not generate content. Please try again.');
    const generated = JSON.parse(match[0]);

    // Get image — use manually selected photo, or fall back to first article image
    let imageUrl = '';
    if (selectedImage && selectedImage !== 'default') {
      imageUrl = selectedImage;
    } else if (selectedImage !== 'default') {
      imageUrl = listArticles.find(a => a.imageUrl)?.imageUrl || '';
    }
    // selectedImage === 'default' means use empty string so app shows defaultimage.jpeg

    // Build final day JSON
    const dayData = {
      headline: generated.headline,
      themes:   generated.themes,
      writeup:  generated.writeup,
      imageUrl,
      articles: listArticles.map(({ title, source, url }) => ({ title, source, url })),
    };

    setState({ status:{ type:'info', msg:'Saving to GitHub...' }});

    // Commit to GitHub
    const filePath = `public/data/${date}.json`;
    const content  = btoa(unescape(encodeURIComponent(JSON.stringify(dayData, null, 2))));

    let sha;
    try {
      const chk = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${filePath}`, {
        headers:{ Authorization:`token ${githubToken}`, Accept:'application/vnd.github.v3+json' }
      });
      if (chk.ok) sha = (await chk.json()).sha;
    } catch(e) {}

    const saveRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${filePath}`, {
      method:'PUT',
      headers:{ Authorization:`token ${githubToken}`, Accept:'application/vnd.github.v3+json', 'Content-Type':'application/json' },
      body: JSON.stringify({ message:`Publish ${date} (editorial)`, content, ...(sha?{sha}:{}) })
    });
    if (!saveRes.ok) throw new Error(`GitHub error: ${(await saveRes.json()).message}`);

    // Update index.json
    const indexPath = 'public/data/index.json';
    let indexSha, indexDates = [];
    try {
      const idxRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${indexPath}`, {
        headers:{ Authorization:`token ${githubToken}`, Accept:'application/vnd.github.v3+json' }
      });
      if (idxRes.ok) {
        const idxData = await idxRes.json();
        indexSha = idxData.sha;
        const decoded = decodeURIComponent(escape(atob(idxData.content.replace(/\n/g,''))));
        indexDates = JSON.parse(decoded).dates || [];
      }
    } catch(e) {}

    if (!indexDates.includes(date)) {
      indexDates.push(date);
      indexDates.sort((a,b) => b.localeCompare(a));
    }
    const idxContent = btoa(unescape(encodeURIComponent(JSON.stringify({ dates:indexDates }, null, 2))));
    await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${indexPath}`, {
      method:'PUT',
      headers:{ Authorization:`token ${githubToken}`, Accept:'application/vnd.github.v3+json', 'Content-Type':'application/json' },
      body: JSON.stringify({ message:`Index update for ${date}`, content:idxContent, ...(indexSha?{sha:indexSha}:{}) })
    });

    // Trigger redeploy
    await fetch(`https://api.github.com/repos/${GITHUB_REPO}/dispatches`, {
      method:'POST',
      headers:{ Authorization:`token ${githubToken}`, Accept:'application/vnd.github.v3+json', 'Content-Type':'application/json' },
      body: JSON.stringify({ event_type:'editorial-publish', client_payload:{ date }})
    });

    setState({
      publishing: false,
      preview: { headline: generated.headline, writeup: generated.writeup },
      status: { type:'success', msg:`✓ Published! "${generated.headline}" — Site is rebuilding, live in ~2 minutes.` }
    });

  } catch(e) {
    setState({ publishing:false, status:{ type:'error', msg:e.message }});
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function checkIcon(color) {
  return `<svg width="11" height="11" viewBox="0 0 12 12" fill="none" class="check-icon">
    <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function render() {
  const { date, articles, images, selectedImage, headline, writeup, list, loading, publishing, generating, status, preview, apiKey, githubToken } = state;
  const canPublish = headline.size > 0 && list.size > 0 && !publishing;

  document.getElementById('app').innerHTML = `
    <div class="config-section">
      <div class="section-label">Configuration — saved in your browser</div>
      <div class="token-label">Anthropic API Key</div>
      <input class="token-input" type="password" id="apiKey" value="${apiKey}" placeholder="sk-ant-..." />
      <div class="token-label">GitHub Personal Access Token (repo scope)</div>
      <input class="token-input" type="password" id="githubToken" value="${githubToken}" placeholder="ghp_..." />
      <button class="save-btn" onclick="saveCredentials()">Save Credentials</button>
    </div>

    <div class="date-bar">
      <input type="date" id="dateInput" value="${date}" max="${new Date().toISOString().split('T')[0]}" />
      <button class="load-btn" onclick="loadArticles()">Load Articles</button>
    </div>

    ${status ? `<div class="status ${status.type}">${status.msg}</div>` : ''}
    ${loading ? `<div class="status info"><span class="spinner"></span>Loading articles...</div>` : ''}

    ${articles.length > 0 ? `

      <div class="instructions">
        <strong>For each article, choose which role(s) it plays:</strong><br/>
        <div class="legend" style="margin-top:10px">
          <div class="legend-item"><div class="legend-dot dot-headline"></div> <strong>Headline</strong> — drives the headline &amp; themes (also auto-included in writeup &amp; list)</div>
          <div class="legend-item"><div class="legend-dot dot-writeup"></div> <strong>Writeup</strong> — considered when writing the day's narrative summary</div>
          <div class="legend-item"><div class="legend-dot dot-list"></div> <strong>List</strong> — appears in "Coverage from this day"</div>
        </div>
        Articles with no checkboxes selected will be <strong>ignored completely</strong>.
      </div>

      <div class="summary-bar">
        <div class="summary-card">
          <div class="summary-count c-headline">${headline.size}</div>
          <div class="summary-label">Headline Articles</div>
        </div>
        <div class="summary-card">
          <div class="summary-count c-writeup">${writeup.size}</div>
          <div class="summary-label">Writeup Articles</div>
        </div>
        <div class="summary-card">
          <div class="summary-count c-list">${list.size}</div>
          <div class="summary-label">Coverage List Articles</div>
        </div>
      </div>

      <div class="articles-table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:200px">Article</th>
              <th class="check-col" style="color:#C60C30">Headline</th>
              <th class="check-col" style="color:#7c3aed">Writeup</th>
              <th class="check-col" style="color:#00338D">List</th>
            </tr>
          </thead>
          <tbody>
            <tr class="select-all-row">
              <td>Quick select all →</td>
              <td class="check-col"></td>
              <td class="check-col"><span onclick="selectAll('writeup')" style="cursor:pointer;text-decoration:underline;color:#7c3aed">All</span></td>
              <td class="check-col"><span onclick="selectAll('list')" style="cursor:pointer;text-decoration:underline;color:#00338D">All</span></td>
            </tr>
            ${articles.map((a, i) => {
              const isHeadline = headline.has(i);
              const isWriteup  = writeup.has(i);
              const isList     = list.has(i);
              const rowClass   = isHeadline ? 'row-headline' : (isWriteup||isList ? 'row-selected' : '');
              return `
              <tr class="${rowClass}">
                <td>
                  <div class="article-title-cell">
                    ${a.title}
                    ${a.url ? `<a href="${a.url}" target="_blank">↗</a>` : ''}
                  </div>
                  <span class="source-badge">${a.source}</span>
                </td>
                <td class="check-col">
                  <div class="cb-wrap" onclick="toggleHeadline(${i})">
                    <div class="cb headline ${isHeadline?'checked':''}">${checkIcon('#C60C30')}</div>
                  </div>
                </td>
                <td class="check-col">
                  <div class="cb-wrap" onclick="toggleWriteup(${i})">
                    <div class="cb writeup ${isWriteup?'checked':''}">${checkIcon('#7c3aed')}</div>
                  </div>
                </td>
                <td class="check-col">
                  <div class="cb-wrap" onclick="toggleList(${i})">
                    <div class="cb list ${isList?'checked':''}">${checkIcon('#00338D')}</div>
                  </div>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>

      <div class="photo-section">
        <div class="section-label">Pick a Photo for This Day</div>
        ${images.length > 0 ? `
          <div class="photo-grid">
            ${images.map((img, i) => `
              <div class="photo-item ${selectedImage === img ? 'selected' : ''}" onclick="selectImage('${img.replace(/'/g, "\\'")}')">
                <img src="${img}" alt="Article photo ${i+1}" onerror="this.parentElement.style.display='none'" />
              </div>`).join('')}
            <div class="photo-default ${selectedImage === 'default' ? 'selected' : ''}" onclick="selectImage('default')">
              📷 Use default<br/>Bills image
            </div>
          </div>` : `
          <div class="photo-none">No photos found in today's articles. The default Bills image will be used.</div>`}
      </div>

      <div class="publish-section">
        <div class="section-label">Preview &amp; Publish</div>

        ${generating ? `<div class="preview-box"><span class="spinner"></span> Generating headline preview...</div>` : ''}
        ${preview && !generating ? `
          <div class="preview-box">
            <div class="preview-headline">${preview.headline}</div>
            ${preview.writeup ? `<div class="preview-writeup" style="margin-top:12px">${preview.writeup}</div>` : ''}
          </div>` : ''}
        ${!preview && !generating && headline.size > 0 ? `<div class="preview-box"><div class="preview-placeholder">Headline preview will appear here...</div></div>` : ''}
        ${headline.size === 0 ? `<div class="preview-box"><div class="preview-placeholder">Select at least one Headline article above to generate a preview.</div></div>` : ''}

        <button class="publish-btn" onclick="publish()" ${!canPublish?'disabled':''}>
          ${publishing ? `<span class="spinner"></span>Publishing...` : '🚀 Publish This Day'}
        </button>
      </div>

    ` : (!loading ? `<div class="empty">Select a date and click "Load Articles" to begin.<br/><br/>The fetch workflow must have run first to generate the pending articles file.</div>` : '')}
  `;

  // Event listeners
  document.getElementById('dateInput')?.addEventListener('change', e => setState({ date: e.target.value }));
  document.getElementById('apiKey')?.addEventListener('input', e => { state.apiKey = e.target.value; });
  document.getElementById('githubToken')?.addEventListener('input', e => { state.githubToken = e.target.value; });
}

function saveCredentials() {
  localStorage.setItem('bhd_api_key', state.apiKey);
  localStorage.setItem('bhd_github_token', state.githubToken);
  setState({ status:{ type:'success', msg:'Credentials saved to browser.' }});
}

window.loadArticles   = loadArticles;
window.selectImage    = (url) => setState({ selectedImage: url });
window.toggleHeadline = toggleHeadline;
window.toggleWriteup  = toggleWriteup;
window.toggleList     = toggleList;
window.selectAll      = selectAll;
window.clearAll       = clearAll;
window.publish        = publish;
window.saveCredentials = saveCredentials;

render();
</script>
</body>
</html>
