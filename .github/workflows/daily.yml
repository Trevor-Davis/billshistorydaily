	name: Daily Bills Update

on:
  # 2am ET = 7am UTC (accounts for ET = UTC-5 in winter, UTC-4 in summer)
  # Using 7am UTC covers both EST and EDT safely
  schedule:
    - cron: '0 7 * * *'

  # Also allow manual runs from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to fetch (YYYY-MM-DD). Leave blank for yesterday.'
        required: false
        default: ''

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch previous day's Bills news
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            node scripts/fetch-daily.js "${{ github.event.inputs.date }}"
          else
            node scripts/fetch-daily.js
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit new data to repository
        run: |
          git config user.name  "Bills Bot"
          git config user.email "bot@billshistorydaily.com"
          git add public/data/
          git diff --staged --quiet \
            && echo "No new data to commit — skipping." \
            || git commit -m "Daily update: $(date -u +%Y-%m-%d)"
          git push

      - name: Build React app
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          cname: billshistorydaily.com
