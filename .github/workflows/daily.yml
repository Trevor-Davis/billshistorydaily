name: Daily Bills Update

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to fetch (YYYY-MM-DD). Leave blank for yesterday.'
        required: false
        default: ''
  repository_dispatch:
    types: [editorial-publish]

jobs:
  fetch:
    runs-on: ubuntu-latest
    # Only run fetch on schedule or manual dispatch, NOT on editorial-publish
    if: github.event_name != 'repository_dispatch'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Pull latest changes
        run: git pull origin main

      - name: Fetch previous day's Bills news
        run: |
          INPUT_DATE="${{ github.event.inputs.date }}"
          if [ -n "$INPUT_DATE" ]; then
            echo "Fetching for specified date: $INPUT_DATE"
            node scripts/fetch-daily.js "$INPUT_DATE"
          else
            echo "Fetching for yesterday (default)"
            node scripts/fetch-daily.js
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit pending articles
        run: |
          git config user.name "Bills Bot"
          git config user.email "bot@billshistorydaily.com"
          git add public/pending/
          git diff --staged --quiet && echo "No new data to commit." || git commit -m "Pending articles: $(date -u +%Y-%m-%d)"
          git push origin main

  deploy:
    runs-on: ubuntu-latest
    # Run deploy after fetch OR when editorial-publish is triggered
    needs: []
    if: always()
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest changes
        run: git pull origin main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          cname: billshistorydaily.com
